  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!--
      Analytics loaders are guarded so the site stays clean on generic hosts
      (e.g. AWS Amplify). The Manus build substitutes the %VITE_ANALYTICS_*%
      placeholders; if they are left unsubstituted (raw "%VITE..."), we skip
      loading the script entirely. HubSpot only loads when a real portal id is
      present. Adjust HS_PORTAL_ID below for your own HubSpot portal.
    -->
    <script>
      (function () {
        // ---- Umami (Manus-hosted) ----
        var umamiSrc = "%VITE_ANALYTICS_ENDPOINT%/umami";
        var umamiId = "%VITE_ANALYTICS_WEBSITE_ID%";
        if (umamiSrc.indexOf("%VITE") === -1 && umamiId.indexOf("%VITE") === -1) {
          var u = document.createElement("script");
          u.defer = true;
          u.src = umamiSrc;
          u.setAttribute("data-website-id", umamiId);
          document.body.appendChild(u);
        }

        // ---- HubSpot ----
        var HS_PORTAL_ID = "246054670"; // Portal 246054670, NA2 region
        if (HS_PORTAL_ID) {
          var h = document.createElement("script");
          h.type = "text/javascript";
          h.id = "hs-script-loader";
          h.async = true;
          h.defer = true;
          h.src = "//js-na2.hs-scripts.com/" + HS_PORTAL_ID + ".js";
          document.body.appendChild(h);
        }
      })();
    </script>
  </body>

</html>
