<svg width="400" height="80" viewBox="0 0 400 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon Mark -->
  <g transform="translate(14, 14)">
    <!-- dashed orbit ring -->
    <circle cx="26" cy="26" r="23" stroke="#1e3a4a" stroke-width="1.5" stroke-dasharray="3 2"/>

    <!-- top-left quad — primary -->
    <rect x="14" y="14" width="10" height="10" rx="2" fill="#00c8ff" fill-opacity="0.15" stroke="#00c8ff" stroke-width="1.2"/>

    <!-- top-right quad — secondary -->
    <rect x="28" y="14" width="10" height="10" rx="2" fill="#00c8ff" fill-opacity="0.06" stroke="#00c8ff" stroke-opacity="0.27" stroke-width="1"/>

    <!-- bottom-left quad — secondary -->
    <rect x="14" y="28" width="10" height="10" rx="2" fill="#00c8ff" fill-opacity="0.06" stroke="#00c8ff" stroke-opacity="0.27" stroke-width="1"/>

    <!-- bottom-right quad — primary -->
    <rect x="28" y="28" width="10" height="10" rx="2" fill="#00c8ff" fill-opacity="0.12" stroke="#00c8ff" stroke-width="1.2"/>

    <!-- center node -->
    <circle cx="26" cy="26" r="2.5" fill="#00c8ff"/>

    <!-- connector lines -->
    <line x1="24" y1="26" x2="20" y2="26" stroke="#00c8ff" stroke-width="1" stroke-opacity="0.7"/>
    <line x1="28" y1="26" x2="32" y2="26" stroke="#00c8ff" stroke-width="1" stroke-opacity="0.7"/>
    <line x1="26" y1="24" x2="26" y2="20" stroke="#00c8ff" stroke-width="1" stroke-opacity="0.7"/>
    <line x1="26" y1="28" x2="26" y2="32" stroke="#00c8ff" stroke-width="1" stroke-opacity="0.7"/>

    <!-- corner accent dots -->
    <circle cx="10" cy="10" r="1.5" fill="#00c8ff" fill-opacity="0.4"/>
    <circle cx="42" cy="10" r="1.5" fill="#00c8ff" fill-opacity="0.4"/>
    <circle cx="10" cy="42" r="1.5" fill="#00c8ff" fill-opacity="0.2"/>
    <circle cx="42" cy="42" r="1.5" fill="#00c8ff" fill-opacity="0.4"/>
  </g>

  <!-- Divider -->
  <line x1="88" y1="18" x2="88" y2="62" stroke="#00c8ff" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Wordmark -->
  <text x="110" y="50" font-family="'Rajdhani', sans-serif" font-weight="700" font-size="36" letter-spacing="0.12em" fill="#e8f4ff">
    <tspan fill="#00c8ff">E</tspan>KAS
  </text>

  <!-- Subtitle -->
  <text x="110" y="66" font-family="'DM Sans', sans-serif" font-weight="300" font-size="9.5" letter-spacing="0.22em" fill="#4a7a9b" text-transform="uppercase">
    ENTERPRISE KNOWLEDGE &amp; ANALYTICS SYSTEM
  </text>
</svg>
